<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Specificity and Cascade</title>
    <style>
      /* The Specificity of this Selctor is 1 */
      h1 {
        color: green;
      }
      /* The Specificity of this Selctor is 10 */
      .yellow {
        color: yellow;
        /* The Specificity of this Selctor is 10 */
      }
      /* The Specificity of this Selctor is 10 */
      .cred {
        color: red;
      }
      /* The Specificity of this Selctor is 10 */
      .cpurple {
        color: purple;
      }
      /* The Specificity of this Selctor is 10 */
      [data-x="a"] {
        background-color: red;
      }
    </style>
  </head>
  <body>
    <div>
      <h1 class="yellow cpurple cred" data-x="a">CSS Specificity</h1>
    </div>
  </body>
</html>
