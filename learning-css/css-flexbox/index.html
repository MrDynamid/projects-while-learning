<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>layout designing</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      nav ul li {
        text-decoration: none;
        display: inline;
        padding: 0px 90px;
        scroll-behavior: smooth;
      }
      nav ul li a {
        text-decoration: none;
        align-items: center;
      }
      nav {
        background-color: violet;
        height: 23px;
        position: sticky;
        top: 0;
      }
      .box1{
        background-color: rgb(20, 199, 20);
        width: 300px;
        height: 250px;
        margin-left: 140px;
        margin-top: 20px;
        display: inline-block;
      }
      .box2{
        background-color: rgb(199, 20, 184);
        width: 300px;
        height: 250px;
        margin-left: 140px;
        margin-top: 20px;
        display: inline-block;
      }

      .background {
        background-color: rgb(243, 255, 80);
        height: 330px;
        margin: 15px;
      }
      body {
        background-color: rgb(224, 219, 219);
      }
      .content {
        border: 2px solid black;
        text-align: center;
        margin-left: 250px;
        margin-right: 250px;
        border-radius: 40px;
        padding: 30px 0px;
      }
      footer{
        background-color: white;
        height: 40px;
        text-align: center;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="#">HOME</a></li>
        <li><a href="#">CONTACT</a></li>
        <li><a href="#">SERVICE</a></li>
        <li><a href="#">ABOUT</a></li>
      </ul>
    </nav>
    <div class="background">
      background
      <main>
        <div class="box1">I am Box1</div>
        <div class="box2">I am Box2</div>
      </main>
    </div>
    <div>
        <img src="https://backup.mrbelieverhub.com/wp-content/uploads/2024/06/cropped-cropped-1707913691839-1-1.png" alt="logo" height="45px width="45px">
    </div>
    <div class="content">
      <h2>Welcome to My Web Development Course</h2>
    </div>
    
    <footer>
        I am footer
    </footer>
    <div class="logo"></div>
  </body>
</html>
