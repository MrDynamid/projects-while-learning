<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shadows and Outlines</title>
    <style>
        .box{
            border: 2px solid black;
            padding: 34px;
            box-shadow:7px 9px 5px rgb(30, 170, 30);
        }
        .text-shadow{
            text-shadow: 4px 2px 3px #eb00ff;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>
    <p class="text-shadow">
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Natus eum fuga, repellendus delectus omnis consectetur rem ipsum tenetur laboriosam sed repudiandae culpa dolor voluptatem impedit quidem deserunt? Dolorem ex doloremque, numquam animi delectus laboriosam.
    </p>
</body>
</html>
